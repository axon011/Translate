<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News NLP Pipeline Dashboard</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #232736;
            --border: #2e3347;
            --text: #e4e6f0;
            --text-dim: #8b8fa3;
            --accent: #6c63ff;
            --accent2: #4ecdc4;
            --per: #ff6b6b;
            --org: #4ecdc4;
            --loc: #ffd93d;
            --misc: #a78bfa;
            --political: #ef4444;
            --economic: #3b82f6;
            --sports: #22c55e;
            --technology: #a855f7;
            --other: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span { color: var(--accent); }

        .status-bar {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .status-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-dim);
            background: var(--surface2);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        .status-dot.off { background: #ef4444; }

        /* Layout */
        .main {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 0;
            height: calc(100vh - 57px);
        }

        /* Input Panel */
        .input-panel {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            background: var(--surface2);
            border-radius: 8px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-dim);
            border: none;
            background: none;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--accent);
            color: white;
        }

        .input-section { display: none; }
        .input-section.active { display: flex; flex-direction: column; gap: 12px; }

        label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
        }

        textarea, input[type="text"], input[type="url"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: border 0.2s;
        }

        textarea:focus, input:focus {
            border-color: var(--accent);
        }

        textarea { min-height: 180px; }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .checkbox-row input[type="checkbox"] {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover { background: #5a52e0; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .rss-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .rss-btn {
            padding: 8px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            transition: all 0.2s;
            text-align: left;
        }

        .rss-btn:hover { border-color: var(--accent); background: rgba(108,99,255,0.1); }
        .rss-btn .rss-lang { font-size: 10px; color: var(--text-dim); }

        /* Results Panel */
        .results-panel {
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .card-header {
            padding: 14px 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-body { padding: 20px; }

        /* Highlighted Text */
        .highlighted-text {
            font-size: 14px;
            line-height: 1.8;
            word-wrap: break-word;
        }

        .entity-highlight {
            padding: 2px 4px;
            border-radius: 4px;
            font-weight: 500;
            position: relative;
            cursor: default;
        }

        .entity-highlight .entity-tag {
            font-size: 9px;
            font-weight: 700;
            vertical-align: super;
            margin-left: 2px;
            opacity: 0.8;
        }

        .entity-PER { background: rgba(255,107,107,0.2); color: var(--per); }
        .entity-ORG { background: rgba(78,205,196,0.2); color: var(--org); }
        .entity-LOC { background: rgba(255,217,61,0.2); color: var(--loc); }
        .entity-MISC { background: rgba(167,139,250,0.2); color: var(--misc); }

        /* Entity Legend */
        .entity-legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        /* Entity List */
        .entity-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .entity-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .entity-chip.PER { background: rgba(255,107,107,0.15); color: var(--per); }
        .entity-chip.ORG { background: rgba(78,205,196,0.15); color: var(--org); }
        .entity-chip.LOC { background: rgba(255,217,61,0.15); color: var(--loc); }
        .entity-chip.MISC { background: rgba(167,139,250,0.15); color: var(--misc); }

        .entity-chip .conf {
            font-size: 11px;
            opacity: 0.7;
        }

        /* Classification */
        .classification-main {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .class-label-big {
            font-size: 28px;
            font-weight: 700;
        }

        .class-confidence {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
        }

        .class-bars {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .class-bar-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .class-bar-label {
            width: 90px;
            font-size: 13px;
            font-weight: 500;
            text-align: right;
        }

        .class-bar-track {
            flex: 1;
            height: 24px;
            background: var(--surface2);
            border-radius: 6px;
            overflow: hidden;
        }

        .class-bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.6s ease;
            display: flex;
            align-items: center;
            padding-left: 8px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            min-width: 36px;
        }

        .class-bar-fill.Political { background: var(--political); }
        .class-bar-fill.Economic { background: var(--economic); }
        .class-bar-fill.Sports { background: var(--sports); }
        .class-bar-fill.Technology { background: var(--technology); }
        .class-bar-fill.Other { background: var(--other); }

        /* Summary */
        .summary-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text);
            padding: 16px;
            background: var(--surface2);
            border-radius: 8px;
            border-left: 3px solid var(--accent);
        }

        .summary-meta {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Timings */
        .timings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .timing-card {
            background: var(--surface2);
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }

        .timing-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent2);
        }

        .timing-label {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
            text-transform: uppercase;
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,17,23,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .loading-overlay.active { display: flex; }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 14px;
            color: var(--text-dim);
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            gap: 12px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
        }

        /* Info row */
        .info-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .info-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: var(--surface2);
        }

        /* Two-column results */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .results-grid .card.full-width {
            grid-column: 1 / -1;
        }

        @media (max-width: 1200px) {
            .results-grid { grid-template-columns: 1fr; }
            .main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1><span>NLP</span> Pipeline Dashboard</h1>
    <div class="status-bar">
        <div class="status-chip">
            <div class="status-dot" id="gpu-dot"></div>
            <span id="gpu-status">Checking GPU...</span>
        </div>
        <div class="status-chip">
            <span id="vram-status">VRAM: --</span>
        </div>
    </div>
</div>

<div class="main">
    <!-- Input Panel -->
    <div class="input-panel">
        <div class="tab-bar">
            <button class="tab active" data-tab="text">Text</button>
            <button class="tab" data-tab="url">URL</button>
            <button class="tab" data-tab="rss">RSS Feed</button>
        </div>

        <!-- Text Input -->
        <div class="input-section active" id="tab-text">
            <label>Input Text (German or English)</label>
            <textarea id="text-input" placeholder="Paste a German or English news article here...">Angela Merkel traf sich mit Emmanuel Macron in Berlin, um die europäische Wirtschaftspolitik und Verteidigungskooperation zu besprechen. Die beiden Staatschefs einigten sich auf ein gemeinsames Vorgehen zur Bekämpfung der Inflation und der Energiepreise in der Europäischen Union.</textarea>
            <div class="checkbox-row">
                <input type="checkbox" id="text-summary" checked>
                <label for="text-summary" style="text-transform:none;font-weight:400;font-size:13px;">Include summary</label>
            </div>
            <button class="btn btn-primary" onclick="processText()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                Process Text
            </button>
        </div>

        <!-- URL Input -->
        <div class="input-section" id="tab-url">
            <label>Article URL</label>
            <input type="url" id="url-input" placeholder="https://www.tagesschau.de/...">
            <div class="checkbox-row">
                <input type="checkbox" id="url-summary" checked>
                <label for="url-summary" style="text-transform:none;font-weight:400;font-size:13px;">Include summary</label>
            </div>
            <button class="btn btn-primary" onclick="processUrl()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                Scrape & Process
            </button>
        </div>

        <!-- RSS Feed -->
        <div class="input-section" id="tab-rss">
            <label>Select RSS Feed</label>
            <div class="rss-grid">
                <button class="rss-btn" onclick="processRss('Top News')">
                    BBC Top News<br><span class="rss-lang">English</span>
                </button>
                <button class="rss-btn" onclick="processRss('World')">
                    BBC World<br><span class="rss-lang">English</span>
                </button>
                <button class="rss-btn" onclick="processRss('Technology')">
                    BBC Technology<br><span class="rss-lang">English</span>
                </button>
                <button class="rss-btn" onclick="processRss('Business')">
                    BBC Business<br><span class="rss-lang">English</span>
                </button>
                <button class="rss-btn" onclick="processRss('Tagesschau')">
                    Tagesschau<br><span class="rss-lang">Deutsch</span>
                </button>
                <button class="rss-btn" onclick="processRss('Spiegel')">
                    Spiegel<br><span class="rss-lang">Deutsch</span>
                </button>
                <button class="rss-btn" onclick="processRss('DW German')">
                    DW German<br><span class="rss-lang">Deutsch</span>
                </button>
                <button class="rss-btn" onclick="processRss('ZDF')">
                    ZDF<br><span class="rss-lang">Deutsch</span>
                </button>
            </div>
            <div style="margin-top:8px;">
                <label>Max Articles</label>
                <input type="text" id="rss-max" value="3" style="width:60px;text-align:center;">
            </div>
        </div>

        <!-- Recent Results -->
        <div style="margin-top:auto;padding-top:16px;border-top:1px solid var(--border);">
            <label>Processing History</label>
            <div id="history-list" style="margin-top:8px;display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--text-dim);">
                <div style="text-align:center;padding:20px;">No results yet</div>
            </div>
        </div>
    </div>

    <!-- Results Panel -->
    <div class="results-panel" id="results-panel">
        <div class="empty-state" id="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-3-3v6m-7 4h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <div style="font-size:16px;font-weight:500;">No Results Yet</div>
            <div style="font-size:13px;">Enter text, paste a URL, or select an RSS feed to get started</div>
        </div>

        <!-- Single result view (text/url) -->
        <div id="results-content" style="display:none;">
            <div class="info-row" id="info-row"></div>

            <div class="results-grid">
                <!-- Annotated Text -->
                <div class="card full-width">
                    <div class="card-header">
                        <span>Annotated Text</span>
                        <div class="entity-legend">
                            <div class="legend-item"><div class="legend-dot" style="background:var(--per)"></div>Person</div>
                            <div class="legend-item"><div class="legend-dot" style="background:var(--org)"></div>Organization</div>
                            <div class="legend-item"><div class="legend-dot" style="background:var(--loc)"></div>Location</div>
                            <div class="legend-item"><div class="legend-dot" style="background:var(--misc)"></div>Misc</div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="highlighted-text" id="annotated-text"></div>
                    </div>
                </div>

                <!-- Entities -->
                <div class="card">
                    <div class="card-header">
                        <span>Entities</span>
                        <span id="entity-count" style="color:var(--accent);font-weight:700;"></span>
                    </div>
                    <div class="card-body">
                        <div class="entity-list" id="entity-list"></div>
                    </div>
                </div>

                <!-- Classification -->
                <div class="card">
                    <div class="card-header">Classification</div>
                    <div class="card-body">
                        <div class="classification-main" id="class-main"></div>
                        <div class="class-bars" id="class-bars"></div>
                    </div>
                </div>

                <!-- Summary -->
                <div class="card" id="summary-card" style="display:none;">
                    <div class="card-header">Summary</div>
                    <div class="card-body">
                        <div class="summary-text" id="summary-text"></div>
                        <div class="summary-meta" id="summary-meta"></div>
                    </div>
                </div>

                <!-- Timings -->
                <div class="card">
                    <div class="card-header">Performance</div>
                    <div class="card-body">
                        <div class="timings-grid" id="timings-grid"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RSS results view (separate container) -->
        <div id="rss-results-content" style="display:none;">
            <div class="info-row" id="rss-info-row"></div>
            <div class="results-grid" id="rss-results-grid"></div>
        </div>
    </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Processing...</div>
    <div class="loading-text" id="loading-timer" style="font-size:12px;margin-top:4px;"></div>
    <div class="loading-text" style="font-size:11px;margin-top:8px;opacity:0.5;">First request loads models into GPU (~5-10s)</div>
</div>

<script>
const API = '';
let history = [];

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.input-section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
});

// Health check
async function checkHealth() {
    try {
        const res = await fetch(API + '/health');
        const data = await res.json();
        const dot = document.getElementById('gpu-dot');
        const status = document.getElementById('gpu-status');
        const vram = document.getElementById('vram-status');

        if (data.gpu_available) {
            dot.classList.remove('off');
            status.textContent = data.gpu_name || 'GPU Ready';
            vram.textContent = `VRAM: ${data.gpu_memory_used_mb}/${data.gpu_memory_total_mb} MB`;
        } else {
            dot.classList.add('off');
            status.textContent = 'CPU Only';
            vram.textContent = 'No GPU';
        }
    } catch (e) {
        document.getElementById('gpu-dot').classList.add('off');
        document.getElementById('gpu-status').textContent = 'API Offline';
    }
}

let loadingTimer = null;
let loadingStart = 0;

function showLoading(text) {
    document.getElementById('loading-text').textContent = text;
    document.getElementById('loading').classList.add('active');
    loadingStart = Date.now();
    const timerEl = document.getElementById('loading-timer');
    loadingTimer = setInterval(() => {
        const elapsed = ((Date.now() - loadingStart) / 1000).toFixed(1);
        timerEl.textContent = `${elapsed}s elapsed`;
    }, 100);
}

function hideLoading() {
    document.getElementById('loading').classList.remove('active');
    if (loadingTimer) { clearInterval(loadingTimer); loadingTimer = null; }
}

// Process text
async function processText() {
    const text = document.getElementById('text-input').value.trim();
    if (!text) return;

    showLoading('Running NLP pipeline on text...');
    try {
        const res = await fetch(API + '/extract', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                text: text,
                include_summary: document.getElementById('text-summary').checked
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'API Error');
        renderResults(data, text);
        addHistory('Text', data.language_detected, data.classification.label);
    } catch (e) {
        alert('Error: ' + e.message);
    }
    hideLoading();
}

// Process URL
async function processUrl() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;

    showLoading('Scraping article and running pipeline...');
    try {
        const res = await fetch(API + '/scrape', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                url: url,
                include_summary: document.getElementById('url-summary').checked
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'API Error');

        // For scrape, we need to get the original text from entities offsets
        // Reconstruct by fetching via extract with same text isn't possible
        // Show URL result with a note
        renderResults(data, null);
        addHistory('URL', data.language_detected, data.classification.label);
    } catch (e) {
        alert('Error: ' + e.message);
    }
    hideLoading();
}

// Process RSS
async function processRss(source) {
    const max = parseInt(document.getElementById('rss-max').value) || 3;
    showLoading(`Scraping ${max} articles from ${source}...`);
    try {
        const res = await fetch(API + '/rss', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ source: source, max_articles: max })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'API Error');
        renderRssResults(data);
        addHistory(`RSS: ${source}`, '', `${data.results.length} articles`);
    } catch (e) {
        alert('Error: ' + e.message);
    }
    hideLoading();
}

function renderResults(data, originalText) {
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('rss-results-content').style.display = 'none';
    document.getElementById('results-content').style.display = 'block';

    // Info row
    const lang = data.language_detected === 'de' ? 'German' : 'English';
    const langFlag = data.language_detected === 'de' ? 'DE' : 'EN';
    let infoHtml = `
        <div class="info-badge"><strong>${langFlag}</strong> ${lang}</div>
        <div class="info-badge">${data.entities.length} entities</div>
        <div class="info-badge">${data.processing_time_ms.toFixed(0)}ms total</div>
        <div class="info-badge">ID: ${data.request_id}</div>
    `;
    if (data.word_count) {
        infoHtml += `<div class="info-badge">${data.word_count} words</div>`;
    }
    document.getElementById('info-row').innerHTML = infoHtml;

    // Annotated text
    if (originalText) {
        renderAnnotatedText(originalText, data.entities);
    } else {
        document.getElementById('annotated-text').innerHTML =
            '<div style="color:var(--text-dim);font-style:italic;">Original text not available for scraped URLs. Entity annotations are shown below.</div>';
    }

    // Entities
    document.getElementById('entity-count').textContent = data.entities.length;
    const uniqueEntities = [];
    const seen = new Set();
    data.entities.forEach(e => {
        const key = e.text + '|' + e.label;
        if (!seen.has(key) && e.text.trim()) {
            seen.add(key);
            uniqueEntities.push(e);
        }
    });
    document.getElementById('entity-list').innerHTML = uniqueEntities.map(e =>
        `<div class="entity-chip ${e.label}">
            <strong>${e.text}</strong>
            <span class="conf">${e.label} ${(e.confidence * 100).toFixed(0)}%</span>
        </div>`
    ).join('');

    // Classification
    const cls = data.classification;
    document.getElementById('class-main').innerHTML = `
        <div class="class-confidence">${(cls.confidence * 100).toFixed(0)}%</div>
        <div class="class-label-big" style="color:var(--${cls.label.toLowerCase()})">${cls.label}</div>
    `;

    const sortedScores = Object.entries(cls.all_scores).sort((a, b) => b[1] - a[1]);
    document.getElementById('class-bars').innerHTML = sortedScores.map(([label, score]) =>
        `<div class="class-bar-row">
            <div class="class-bar-label">${label}</div>
            <div class="class-bar-track">
                <div class="class-bar-fill ${label}" style="width:${Math.max(score * 100, 2)}%">
                    ${(score * 100).toFixed(1)}%
                </div>
            </div>
        </div>`
    ).join('');

    // Summary
    const summaryCard = document.getElementById('summary-card');
    if (data.summary) {
        summaryCard.style.display = 'block';
        document.getElementById('summary-text').textContent = data.summary.summary;
        document.getElementById('summary-meta').innerHTML = `
            <span>Input: ${data.summary.input_length} words</span>
            <span>Summary: ${data.summary.output_length} words</span>
            <span>Compression: ${((1 - data.summary.output_length / data.summary.input_length) * 100).toFixed(0)}%</span>
        `;
    } else {
        summaryCard.style.display = 'none';
    }

    // Timings
    const timings = data.timings || { total_ms: data.processing_time_ms };
    const timingNames = {
        lang_detect_ms: 'Lang Detect',
        ner_ms: 'NER',
        classification_ms: 'Classifier',
        translation_ms: 'Translation',
        summarization_ms: 'Summarizer',
        asr_ms: 'ASR',
        total_ms: 'Total'
    };

    document.getElementById('timings-grid').innerHTML = Object.entries(timings)
        .filter(([k]) => timingNames[k])
        .map(([k, v]) => `
            <div class="timing-card">
                <div class="timing-value">${v.toFixed(0)}<span style="font-size:14px;opacity:0.7">ms</span></div>
                <div class="timing-label">${timingNames[k]}</div>
            </div>
        `).join('');

    checkHealth();
}

function renderAnnotatedText(text, entities) {
    // Sort entities by start position, longest first for overlapping
    const sorted = [...entities]
        .filter(e => e.text && e.text.trim())
        .sort((a, b) => a.start - b.start || b.end - a.end);

    // Remove overlapping entities (keep first/longest)
    const filtered = [];
    let lastEnd = -1;
    for (const e of sorted) {
        if (e.start >= lastEnd) {
            filtered.push(e);
            lastEnd = e.end;
        }
    }

    let html = '';
    let pos = 0;
    for (const e of filtered) {
        if (e.start > pos) {
            html += escapeHtml(text.substring(pos, e.start));
        }
        html += `<span class="entity-highlight entity-${e.label}" title="${e.label}: ${(e.confidence * 100).toFixed(1)}%">${escapeHtml(e.text)}<span class="entity-tag">${e.label}</span></span>`;
        pos = e.end;
    }
    if (pos < text.length) {
        html += escapeHtml(text.substring(pos));
    }

    document.getElementById('annotated-text').innerHTML = html;
}

function renderRssResults(data) {
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('results-content').style.display = 'none';
    document.getElementById('rss-results-content').style.display = 'block';

    document.getElementById('rss-info-row').innerHTML = `
        <div class="info-badge"><strong>${data.source}</strong></div>
        <div class="info-badge">${data.results.length} articles processed</div>
        <div class="info-badge">${data.processing_time_ms.toFixed(0)}ms total</div>
    `;

    // Show each article as a card
    let html = '';
    data.results.forEach((r, i) => {
        const cls = r.classification;
        const lang = r.language_detected === 'de' ? 'DE' : 'EN';
        const uniqueEntities = [];
        const seen = new Set();
        r.entities.forEach(e => {
            const key = e.text + '|' + e.label;
            if (!seen.has(key) && e.text.trim()) {
                seen.add(key);
                uniqueEntities.push(e);
            }
        });

        html += `
        <div class="card full-width">
            <div class="card-header">
                <span>${lang} | Article ${i + 1}: ${escapeHtml(r.title || 'Untitled')}</span>
                <span style="color:var(--${cls.label.toLowerCase()});font-weight:700;">${cls.label} (${(cls.confidence * 100).toFixed(0)}%)</span>
            </div>
            <div class="card-body">
                <div class="entity-list">
                    ${uniqueEntities.map(e =>
                        `<div class="entity-chip ${e.label}"><strong>${escapeHtml(e.text)}</strong><span class="conf">${e.label}</span></div>`
                    ).join('')}
                </div>
                ${r.summary ? `<div class="summary-text" style="margin-top:12px;">${escapeHtml(r.summary.summary)}</div>` : ''}
            </div>
        </div>`;
    });

    document.getElementById('rss-results-grid').innerHTML = html;
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function addHistory(type, lang, result) {
    const time = new Date().toLocaleTimeString();
    history.unshift({ type, lang, result, time });
    if (history.length > 10) history.pop();

    document.getElementById('history-list').innerHTML = history.map(h =>
        `<div style="display:flex;justify-content:space-between;padding:4px 8px;background:var(--surface2);border-radius:4px;">
            <span>${h.type} ${h.lang ? '(' + h.lang.toUpperCase() + ')' : ''}</span>
            <span>${h.result} - ${h.time}</span>
        </div>`
    ).join('');
}

// Init
checkHealth();
setInterval(checkHealth, 30000);
</script>

</html>
